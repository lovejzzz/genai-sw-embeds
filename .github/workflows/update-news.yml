name: Update AI News Daily

on:
  schedule:
    # Runs every day at 7:03 AM UTC (3:03 AM ET / 12:03 AM PT)
    - cron: '3 7 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install feedparser requests

      - name: Fetch AI news from RSS feeds
        run: python scripts/fetch_news.py

      - name: Check for changes
        id: changes
        run: |
          git add news-data.json archive/
          if git diff --cached --quiet 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push updated news
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          DATE=$(date -u +"%Y-%m-%d")
          git commit -m "$(cat <<EOF
          Update AI Times — ${DATE}

          Auto-generated daily edition from 13+ RSS feeds worldwide.
          EOF
          )"
          git push
